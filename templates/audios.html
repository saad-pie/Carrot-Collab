<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generated Audios</title>
</head>
<body>
    <h1>Generated TTS Audios for: {{ topic }}</h1>
    <ul>
        {% for subtopic, script, audio in zip(subtopics, scripts, audios) %}
            <li>
                <strong>{{ subtopic }}</strong><br>
                {{ script }}<br>
                <audio controls>
                    <source src="data:audio/wav;base64,{{ audio }}" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            </li>
        {% endfor %}
    </ul>
    <form method="post">
        <input type="submit" value="Combine All Into Final Video">
    </form>
    <a href="/videos">Back</a>
</body>
</html>
